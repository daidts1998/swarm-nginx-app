name: CI/CD Pipeline for Nginx

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    # Lệnh cực kỳ quan trọng: Điều hướng tiến trình về máy plc-master1 của bạn
    runs-on: self-hosted 

    steps:
    - name: 1. Lay ma nguon tu GitHub
      uses: actions/checkout@v4

    - name: 2. Dang nhap Docker Hub
      uses: docker/login-action@v3
      with:
        username: vandaj98
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: 3. Build Image va Push len Docker Hub
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          vandaj98/nginx-agency:${{ github.sha }}
          vandaj98/nginx-agency:latest

    - name: 4. Cap nhat Swarm truc tiep tai Local
      # Không cần action SSH nữa, gọi trực tiếp lệnh docker update cực nhanh
      run: |
        docker service update --image vandaj98/nginx-agency:${{ github.sha }} --resolve-image never nginx_nginx

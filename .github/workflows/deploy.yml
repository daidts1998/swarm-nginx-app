name: CI/CD Pipeline for Nginx

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted 

    steps:
    - name: 1. Lay ma nguon tu GitHub
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: 2. Dang nhap Docker Hub
      uses: docker/login-action@v3
      with:
        username: vandaj98
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: 3. Build Image va Push len Docker Hub
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          vandaj98/nginx-agency:${{ github.sha }}
          vandaj98/nginx-agency:v2

    - name: 4. Cap nhat Swarm truc tiep tai Local
      run: |
        docker service update --with-registry-auth --image vandaj98/nginx-agency:${{ github.sha }} nginx_nginx

name: CI/CD Pipeline for Nginx

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Lấy mã nguồn từ GitHub
      uses: actions/checkout@v4

    - name: 2. Đăng nhập Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: 3. Build Image và Push lên Docker Hub
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/nginx-agency:${{ github.sha }}

    - name: 4. SSH vào Swarm và tự động Deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SWARM_HOST }}
        username: ${{ secrets.SWARM_USERNAME }}
        key: ${{ secrets.SWARM_SSH_KEY }}
        script: |
          docker service update --image ${{ secrets.DOCKERHUB_USERNAME }}/nginx-agency:${{ github.sha }} --resolve-image never nginx_nginx

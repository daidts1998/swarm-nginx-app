name: CI/CD Pipeline for Nginx

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Lay ma nguon tu GitHub
      uses: actions/checkout@v4

    - name: 2. Dang nhap Docker Hub
      uses: docker/login-action@v3
      with:
        username: vandaj98
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: 3. Build Image va Push len Docker Hub
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          vandaj98/nginx-agency:${{ github.sha }}
          vandaj98/nginx-agency:latest

    - name: 4. SSH vao Swarm va tu dong Deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SWARM_HOST }}
        username: ${{ secrets.SWARM_USERNAME }}
        key: ${{ secrets.SWARM_SSH_KEY }}
        script: |
          docker service update --image vandaj98/nginx-agency:${{ github.sha }} --resolve-image never nginx_nginx
